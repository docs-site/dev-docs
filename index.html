<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Document</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>

<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '',
      repo: '',
      loadSidebar: true, // 加载自定义侧边栏。设置为 true 后会加载 _sidebar.md 文件，也可以自定义加载的文件名(例如：loadSidebar: 'summary.md')。
      copyCode: {        // docsify-copy-code (defaults)
        buttonText: 'Copy',
        errorText: 'Error',
        successText: 'Copied'
      },
      imagePath: {
        basePath: '/dev-docs'  // 部署目录前缀
      },
      count: {           // docsify-count (defaults)
        countable: true,
        fontsize: '0.9em',
        color: 'rgb(90,90,90)',
        language: 'chinese'
      },
      pagination: {      // docsify-pagination (defaults)
        previousText: '上一章节',
        // or
        nextText: {
          '/en/': 'NEXT',
          '/': '下一章节'
        },
        crossChapter: true,
        crossChapterText: true,
      },
      breadcrumb: {
        showHome: true,
        homeText: 'Home',
        separator: ' &rsaquo; ',
        casing: 'capitalize',
        linkColor: 'var(--theme-color, #42b983)',
        size: 'small'
      }
    }
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>

  <!-- plugins -->
  <!-- 1. https://github.com/iPeng6/docsify-sidebar-collapse - Support docsify sidebar catalog expand and collapse. -->
  <link rel="stylesheet" href="./.docsify/styles/sidebar.css" />
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
  <!-- 2. https://github.com/jperasmus/docsify-copy-code - A docsify plugin that copies Markdown code block to your clipboard -->
  <link rel="stylesheet" href="./.docsify/styles/copy_code.css" />
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <!-- 3. https://github.com/827652549/docsify-count - Add word count for markdown files of docsify.(添加字数统计). -->
  <script src="//unpkg.com/docsify-count/dist/countable.js"></script>
  <!-- 4. https://github.com/imyelo/docsify-pagination - Pagination for docsify -->
  <link rel="stylesheet" href="./.docsify/styles/pagination.css" />
  <script src="//unpkg.com/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <!-- 5. 自定义图片路径转换插件 -->
  <script src="./.docsify/plugins/docsify-image-path.js"></script>
  <!-- 6. 面包屑导航插件 -->
  <link rel="stylesheet" href="./.docsify/styles/docsify-breadcrumb.css" />
  <script src="./.docsify/plugins/docsify-breadcrumb.js"></script>
  <!-- 7. 格式化内容插件 -->
  <script src="./.docsify/plugins/docsify-formatter.js"></script>
</body>

</html>
